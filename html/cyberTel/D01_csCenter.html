                    <div>
                        <form action="전송될주소" method="post" class="form01"> <!-- post: 개인정보 안보임 -->
                            <fieldset> <!-- form과 필수는 아님 -->
                                <legend>구입자 정보</legend>
                                <div>
                                    <label for="id" class="w100">ID</label>
                                    <input id="id" type="text" />
                                </div>
                                <div>
                                    <label for="pwd" class="w100">비밀번호</label>
                                    <input id="pwd" type="password" />
                                </div>
                                <div>
                                    <label for="pwd2" class="w100">비밀번호 확인</label>
                                    <input id="pwd2" type="password" />
                                </div>
                                <div>
                                    <span>
                                        <input type="radio" name="r1" id="per" />
                                        <label for="per">개인</label>
                                    </span>
                                    <span>
                                        <input type="radio" name="r1" id="comp" />
                                        <label for="comp">회사</label>
                                    </span>
                                </div>
                                <div>
                                    <label for="name" class="w100">성명/회사명</label>
                                    <input id="name" type="text" />
                                </div>
                                <div>
                                    <label for="phone" class="w100">전화번호</label>
                                    <input id="phone" type="text" />
                                </div>
                                <div>
                                    <label for="email" class="w100">E-mail</label>
                                    <input id="email" type="text" /> @ 
                                    <select name="email2" id="email2">
                                        <option value="">====== Select Mail ======</option>
                                        <option value="네이버">네이버</option>
                                        <option value="다음">다음</option>
                                        <option value="구글">구글</option>
                                    </select>
                                </div>
                            </fieldset>
                            <fieldset> <!-- form과 필수는 아님 -->
                                <legend>제품 정보</legend>
                                <table>
                                    <tr>
                                        <th>Every Talk Sollution</th>
                                        <th>VoIP</th>
                                        <th>PBX Appendage</th>
                                    </tr>
                                    <tr>
                                        <td>
                                            <span>
                                                <input id="ips" type="checkbox" />
                                                <label for="ips">IP PIT Server</label>
                                            </span>
                                            <span>
                                                <input id="ss" type="checkbox" />
                                                <label for="ss">SIP Server</label>
                                            </span>
                                            <span>
                                                <input id="cx" type="checkbox" />
                                                <label for="cx">CX200</label>
                                            </span>
                                            <span>
                                                <input id="cc" type="checkbox" />
                                                <label for="cc">Command Center</label>
                                            </span>
                                            <span>
                                                <input id="rs" type="checkbox" />
                                                <label for="rs">Recording Server</label>
                                            </span>
                                        </td>
                                        <td>

                                                <input id="Stack" type="checkbox" />
                                                <label for="Stack">Stack</label>
                                            </span>

                                            </span>
                                            <span>
                                                <input id="HCM" type="checkbox" />
                                                <label for="HCM">HCM</label>
                                            </span>
                                        </td>
                                        <td>
                                            <span>
                                                <input id="PMS" type="checkbox" />

                                            </span>
                                            <span>
                                                <input id="BAPS" type="checkbox" />
                                                <label for="BAPS">BAPS</label>
                                            </span>
                                            <span>
                                                <input id="bw" type="checkbox" />
                                                <label for="bw">Baps for web</label>
                                            </span>
                                        </td>
                                    </tr>
                                </table>
                                <div>
                                    <label for="qna" class="w100">문의 사항</label>
                                    <textarea name="qna" id="qna" cols="70" rows="10" placeholder="문의사항은 1000자 이내로 입력해 주세요!"></textarea>
                                </div>
                            </fieldset>
                            <div>
                                <input type="submit" value="확인" />
                                <input type="reset" value="취소" />
